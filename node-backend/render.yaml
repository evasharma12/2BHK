# Render Blueprint: deploy backend from repo root with Root Directory = node-backend
# Or deploy this folder as a standalone repo.
services:
  - type: web
    name: 2bhk-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: GOOGLE_AUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_AUTH_CLIENT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: API_BASE_URL
        sync: false
